<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Explorer - 英文日期冒險王</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #2F3E46;
        }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .game-header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            width: 100%;
            border-bottom: 5px solid var(--primary);
        }
        .nav-buttons {
            margin: 20px;
        }
        button.nav-btn {
            padding: 15px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            margin: 5px;
            transition: 0.3s;
            background: #556670;
            color: white;
        }
        button.nav-btn.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
        }
        .level-container {
            display: none;
            width: 90%;
            max-width: 800px;
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 0 #999;
            margin-bottom: 50px;
        }
        .level-container.active { display: block; animation: fadeIn 0.5s; }
        
        /* Grid Layouts */
        .grid-31 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        .grid-12 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .item-card {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .item-card:hover { background: var(--secondary); color: white; transform: translateY(-5px); }
        .item-card span { display: block; font-size: 0.8rem; color: #666; }
        .item-card:hover span { color: white; }

        /* Level 3 Special */
        .challenge-box {
            text-align: center;
            padding: 40px;
            border: 4px dashed var(--primary);
            border-radius: 20px;
        }
        #display-date {
            font-size: 3rem;
            color: var(--primary);
            margin: 20px 0;
            font-weight: bold;
        }
        .big-btn {
            background: var(--secondary);
            color: white;
            font-size: 1.5rem;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="game-header">
    <h1>🚀 Date Explorer 英文日期大冒險</h1>
    <p>點擊按鈕，解鎖你的英文超能力！</p>
</div>

<div class="nav-buttons">
    <button class="nav-btn active" onclick="showLevel(1)">Level 1: 日期 (1-31)</button>
    <button class="nav-btn" onclick="showLevel(2)">Level 2: 月份 (1-12)</button>
    <button class="nav-btn" onclick="showLevel(3)">Level 3: 終極挑戰</button>
</div>

<div id="level1" class="level-container active">
    <h2>🎯 第一關：日期序數 (Ordinal Numbers)</h2>
    <p>記住：日期要讀成 "The First", "The Second"...</p>
    <div class="grid-31" id="daysGrid"></div>
</div>

<div id="level2" class="level-container">
    <h2>🌈 第二關：十二個月份 (Months)</h2>
    <p>點擊月份聽聽發音，留意字尾的變化！</p>
    <div class="grid-12" id="monthsGrid"></div>
</div>

<div id="level3" class="level-container">
    <h2>🏆 第三關：全日期大挑戰</h2>
    <div class="challenge-box">
        <p>點擊下方按鈕，隨機生成一個日子並試著讀出來：</p>
        <div id="display-date">Ready?</div>
        <button class="big-btn" onclick="generateRandomDate()">🎲 隨機生成日期</button>
        <p style="margin-top:20px;">點擊日期可以聽正確讀音喔！</p>
    </div>
</div>

<script>
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    const ordinals = ["1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th", 
                     "11th", "12th", "13th", "14th", "15th", "16th", "17th", "18th", "19th", "20th",
                     "21st", "22nd", "23rd", "24th", "25th", "26th", "27th", "28th", "29th", "30th", "31st"];

    const ordinalFull = ["First", "Second", "Third", "Fourth", "Fifth", "Sixth", "Seventh", "Eighth", "Ninth", "Tenth",
                        "Eleventh", "Twelfth", "Thirteenth", "Fourteenth", "Fifteenth", "Sixteenth", "Seventeenth", "Eighteenth", "Nineteenth", "Twentieth",
                        "Twenty-first", "Twenty-second", "Twenty-third", "Twenty-fourth", "Twenty-fifth", "Twenty-sixth", "Twenty-seventh", "Twenty-eighth", "Twenty-ninth", "Thirtieth", "Thirty-first"];

    // 初始化 Level 1
    const daysGrid = document.getElementById('daysGrid');
    ordinals.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `<strong>${day}</strong><span>${ordinalFull[index]}</span>`;
        card.onclick = () => speak(ordinalFull[index]);
        daysGrid.appendChild(card);
    });

    // 初始化 Level 2
    const monthsGrid = document.getElementById('monthsGrid');
    months.forEach(m => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `<strong>${m}</strong>`;
        card.onclick = () => speak(m);
        monthsGrid.appendChild(card);
    });

    // 切換 Level
    function showLevel(lv) {
        document.querySelectorAll('.level-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('level' + lv).classList.add('active');
        event.target.classList.add('active');
    }

    // 發音
    function speak(text) {
        window.speechSynthesis.cancel(); // 停止之前的聲音
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'en-US';
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    // Level 3 邏輯
    let currentRandomDate = "";
    function generateRandomDate() {
        const rMonth = months[Math.floor(Math.random() * months.length)];
        const rDayIndex = Math.floor(Math.random() * 31);
        const rDay = ordinals[rDayIndex];
        const rDayFull = ordinalFull[rDayIndex];
        
        currentRandomDate = `${rDayFull} of ${rMonth}`;
        document.getElementById('display-date').innerText = `${rDay} ${rMonth}`;
        document.getElementById('display-date').onclick = () => speak(currentRandomDate);
    }
</script>

</body>
</html>
